<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1,
        h2,
        h3 {

            text-align: center;
        }

        p {

            color: blue;
        }

        .destaque {

            font-weight: bold;
        }

        #titulo {

            color: red;
        }

        .info {

            color: green;

        }
    </style>
</head>

<body>

    <h1 id="titulo">Bem-vindo</h1>

    <p>Parágrafo comum</p>

    <p class="destaque">Parágrafo em destaque</p>

    <h2>subtítulo</h2>

    <h3>outro subtítulo</h3>

    <p class="info">Informação importante</p>


</body>

</html>
